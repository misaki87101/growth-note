plugins:
  - rubocop-rails
  - rubocop-performance

AllCops:
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/**/*'
    - 'config/**/*'
    - 'node_modules/**/*'
    - 'vendor/**/*'

Style/AsciiComments:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  Enabled: false

# 日本語のメッセージ（flash等）をコントローラに直接書くのを許可
Rails/I18nLocaleTexts:
  Enabled: false

# 1つのメソッドの行数制限を緩和（デフォルト10行は厳しいため20行へ）
Metrics/MethodLength:
  Max: 20

# メソッドの複雑度の制限を緩和
Metrics/AbcSize:
  Max: 30

# メソッド名に get_ を使うのを許可
Naming/AccessorMethodName:
  Enabled: false

# inverse_of の指定を不要にする
Rails/InverseOf:
  Enabled: false

# update_columns（バリデーションを飛ばす更新）の警告を抑制
Rails/SkipsModelValidations:
  Enabled: false

# テストコード（spec）の中では、ブロックの長さを気にしないようにする
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'