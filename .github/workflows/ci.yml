name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 1. Dockerコンテナを起動
      - name: Build and run Docker containers
        run: docker compose up -d --build

      # 2. MySQLが立ち上がるのを待つ（ここが安定の秘訣です）
      - name: Wait for MySQL to be ready
        run: sleep 15

      # 3. データベースの作成とマイグレーション
      - name: Database setup
        run: |
          docker compose exec web bundle exec rails db:create
          docker compose exec web bundle exec rails db:migrate

      # 4. RuboCopでコードスタイルをチェック
      - name: Run RuboCop
        run: docker compose exec web bundle exec rubocop

      # 5. RSpecを実行
      - name: Run RSpec
        run: docker compose exec web bundle exec rspec

      # 6. 失敗した時のスクリーンショットを保存（今の設定を活かします！）
      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: tmp/capybara # Docker内のパスに注意が必要ですが一旦これで
          if-no-files-found: ignore